name: Fullstack CI Pipeline

on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]

jobs:

java-build:
name: Java Backend Build
runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  - name: Build Java backend
    working-directory: java-backend
    run: mvn clean package -DskipTests


python-check:
name: Python Service Check
runs-on: ubuntu-latest


steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Python 3.12
    uses: actions/setup-python@v5
    with:
      python-version: 3.12

  - name: Install dependencies
    working-directory: python-service
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Basic import test
    working-directory: python-service
    run: python -c "import app; print('Python service OK')"
