apiVersion: v1
kind: ServiceAccount
metadata:
  name: fullstack-sa
  namespace: fullstack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fullstack-role
  namespace: fullstack
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fullstack-rolebinding
  namespace: fullstack
subjects:
  - kind: ServiceAccount
    name: fullstack-sa
roleRef:
  kind: Role
  name: fullstack-role
  apiGroup: rbac.authorization.k8s.io
